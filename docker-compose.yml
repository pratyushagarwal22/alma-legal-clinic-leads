services:
  db:
    image: postgres:16
    environment:
      POSTGRES_USER: legal
      POSTGRES_PASSWORD: legal
      POSTGRES_DB: legal
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U legal -d legal"]
      interval: 5s
      timeout: 5s
      retries: 5

  mailpit:
    image: axllent/mailpit:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  api:
    build:
      context: ./apps/api
    environment:
      # Reach db and mailpit by their compose service names.
      DATABASE_URL: postgresql+psycopg://legal:legal@db:5432/legal
      SMTP_HOST: mailpit
      SMTP_PORT: 1025
      UPLOADS_DIR: /app/uploads
      JWT_SECRET: change-me
      SEED_ATTORNEY_EMAIL: attorney@example.com
      SEED_ATTORNEY_PASSWORD: change-me
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - uploads:/app/uploads
    healthcheck:
      test:
        - "CMD-SHELL"
        - "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health')\""
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

  web:
    build:
      context: ./apps/web
      args:
        # Baked into the browser bundle at build time. The browser reaches the
        # API on the host-mapped port, so this must be localhost:8000 (NOT the
        # compose service name, which only resolves inside the network).
        NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      # Only start the web app once the API is healthy.
      api:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD-SHELL"
        - "node -e \"require('http').get('http://localhost:3000/apply', r => process.exit(r.statusCode < 500 ? 0 : 1)).on('error', () => process.exit(1))\""
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 20s

volumes:
  pgdata:
  uploads:
